interface:
  display_name: "Codex Principal Team"
  short_description: "Run tasks through delegate-first Codex subagents, skills, automation, Oracle review, and cost optimization"
  default_prompt: "Use $codex-principal-team to run this project task through the principal-engineer operating loop. Start with the Delegation Gate, keep parent work to orchestration/integration/final verification, route non-trivial exploration to explorer and implementation to worker when policy permits, use deterministic scripts where possible, use Oracle via the oracle skill for expensive-to-reverse decisions, and report parent patch share plus reusable skill/script/subagent improvements."
