interface:
  display_name: "Codex Principal Team"
  short_description: "Run tasks through delegate-first Codex subagents, skills, automation, Oracle review, and cost optimization"
  default_prompt: "Use $codex-principal-team to run this project task through the principal-engineer operating loop. Treat this as an explicit delegation/subagent request for non-trivial work when spawn_agent is available. Start with the Delegation Gate, keep parent work to orchestration/integration/final verification, route runtime exploration to explorer and implementation to worker when policy permits, map toolkit agents through the roster, prevent recursive fan-out unless explicitly authorized and depth permits it, use deterministic scripts where possible, use Oracle via the oracle skill for expensive-to-reverse decisions, and report parent patch share plus reusable skill/script/subagent improvements."
