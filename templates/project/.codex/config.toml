[features]
multi_agent = true
collab = true

[agents]
max_threads = 5
max_depth = 1

[agents.triager]
description = "Coordinator that decomposes most non-trivial requests and routes bounded handoffs to the right agent."
config_file = "agents/triager.toml"

[agents.builder]
description = "Write-enabled implementer for bounded files or directories provided in a handoff."
config_file = "agents/builder.toml"

[agents.debater]
description = "Read-only debate participant that argues one assigned perspective against a grounded question."
config_file = "agents/debater.toml"

[agents.moderator]
description = "Read-only synthesizer that compares debate outputs and produces a decision memo."
config_file = "agents/moderator.toml"

[agents.reviewer]
description = "Read-only reviewer focused on correctness, regressions, and missing verification."
config_file = "agents/reviewer.toml"

[agents.researcher]
description = "Read-only researcher for docs, configuration, and external references."
config_file = "agents/researcher.toml"

[agents.trend_researcher]
description = "Read-only researcher that searches recent English-language web sources, extracts repeated market signals, and returns evidence without prematurely locking in final ideas."
config_file = "agents/trend-researcher.toml"

[agents.keyword_curator]
description = "Read-only curator that turns research evidence into 2 to 3 business ideation keywords, mixing source-backed signals with one controlled-random wildcard."
config_file = "agents/keyword-curator.toml"
